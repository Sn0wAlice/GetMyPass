name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Run tests
        run: cargo test --verbose

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: gmpass-linux-amd64
            deb_arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: gmpass-linux-arm64
            deb_arch: arm64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: gmpass-darwin-arm64
            deb_arch: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux amd64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu pkg-config libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: 1

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz gmpass
          cd ../../..

      - name: Build .deb package
        if: matrix.deb_arch != ''
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          bash scripts/build-deb.sh \
            target/${{ matrix.target }}/release/gmpass \
            ${{ matrix.deb_arch }} \
            "$VERSION"

      - name: Upload tar.gz artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

      - name: Upload .deb artifact
        if: matrix.deb_arch != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-deb
          path: gmpass_*.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute sha256 hashes
        id: hashes
        run: |
          echo "darwin_arm64=$(sha256sum artifacts/gmpass-darwin-arm64/gmpass-darwin-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(sha256sum artifacts/gmpass-linux-amd64/gmpass-linux-amd64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum artifacts/gmpass-linux-arm64/gmpass-linux-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "deb_amd64=$(sha256sum artifacts/gmpass-linux-amd64-deb/gmpass_*_amd64.deb | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "deb_arm64=$(sha256sum artifacts/gmpass-linux-arm64-deb/gmpass_*_arm64.deb | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Generate Homebrew Formula
        run: |
          cat > Formula/gmpass.rb << 'FORMULA'
          class Gmpass < Formula
            desc "Simple, fast TUI password manager with AES-256-GCM encryption"
            homepage "https://github.com/Sn0wAlice/GetMyPass"
            version "${{ steps.version.outputs.version }}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/Sn0wAlice/GetMyPass/releases/download/v#{version}/gmpass-darwin-arm64.tar.gz"
                sha256 "${{ steps.hashes.outputs.darwin_arm64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/Sn0wAlice/GetMyPass/releases/download/v#{version}/gmpass-linux-amd64.tar.gz"
                sha256 "${{ steps.hashes.outputs.linux_amd64 }}"
              elsif Hardware::CPU.arm?
                url "https://github.com/Sn0wAlice/GetMyPass/releases/download/v#{version}/gmpass-linux-arm64.tar.gz"
                sha256 "${{ steps.hashes.outputs.linux_arm64 }}"
              end
            end

            def install
              bin.install "gmpass"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/gmpass --version", 0)
            end
          end
          FORMULA
          sed -i 's/^          //' Formula/gmpass.rb

      - name: Push updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gmpass.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update Homebrew formula to v${{ steps.version.outputs.version }}"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: GetMyPass v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/gmpass-darwin-arm64/*.tar.gz
            artifacts/gmpass-linux-amd64/*.tar.gz
            artifacts/gmpass-linux-arm64/*.tar.gz
            artifacts/gmpass-linux-amd64-deb/*.deb
            artifacts/gmpass-linux-arm64-deb/*.deb
